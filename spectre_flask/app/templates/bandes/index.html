{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3">Bandes de fréquence</h1>
  <a class="btn btn-primary" href="{{ url_for('bandes.create') }}">Ajouter</a>
</div>
<form method="get" class="mb-3"><input name="q" value="{{ q }}" class="form-control" placeholder="Recherche par désignation"></form>
<table class="table table-striped">
<thead><tr><th>Désignation</th><th>Plage</th><th>Usage</th><th>Statut</th><th></th></tr></thead>
<tbody>
{% for b in bandes %}
<tr><td>{{ b.designation }}</td><td>{{ b.frequence_debut }} - {{ b.frequence_fin }} {{ b.unite }}</td><td>{{ b.usage_service or '-' }}</td><td>{{ b.statut }}</td><td><a href="{{ url_for('bandes.edit', bande_id=b.id) }}">Modifier</a></td></tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
