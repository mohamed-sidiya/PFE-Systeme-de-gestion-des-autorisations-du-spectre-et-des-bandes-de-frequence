{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3">Demandeurs</h1>
  <a class="btn btn-primary" href="{{ url_for('demandes.demandeurs_create') }}">Ajouter</a>
</div>
<table class="table table-striped"><thead><tr><th>Nom</th><th>Type</th><th>Email</th><th>Téléphone</th></tr></thead><tbody>
{% for d in demandeurs %}<tr><td>{{ d.nom_complet() }}</td><td>{{ d.type_demandeur }}</td><td>{{ d.email or '-' }}</td><td>{{ d.telephone or '-' }}</td></tr>{% endfor %}
</tbody></table>
{% endblock %}
